# ===================================
# SportAccess Backend - Configuracion
# ===================================
spring.application.name=sportaccess-backend

# --- Base de Datos MySQL ---
spring.datasource.url=jdbc:mysql://localhost:3306/sportaccess?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Los10018m.
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# --- Servidor ---
server.port=8080

# --- Thymeleaf ---
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

# --- Logs ---
logging.level.com.sportaccess=DEBUG
logging.level.org.springframework.security=DEBUG
